<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Happy Easter, Reece 🐣</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,400&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Nunito', sans-serif;
  background: #1a6b2a;
  min-height: 100vh;
  overflow-x: hidden;
}

/* SKY */
.sky {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 38vh;
  background: linear-gradient(180deg, #a8dff5 0%, #d4f0a0 100%);
  z-index: 0;
}

/* GROUND LAYERS */
.ground-back {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: 65vh;
  background: #2d8c3e;
  z-index: 0;
}
.ground-mid {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: 45vh;
  background: #3aab4f;
  border-radius: 80% 80% 0 0 / 30px 30px 0 0;
  z-index: 1;
}
.ground-front {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: 22vh;
  background: #4cc464;
  border-radius: 60% 60% 0 0 / 40px 40px 0 0;
  z-index: 2;
}

/* SCENE CANVAS */
.scene {
  position: relative;
  width: 100%;
  min-height: 100vh;
  z-index: 5;
}

/* HEADER */
.header {
  text-align: center;
  padding: 28px 20px 12px;
  position: relative;
  z-index: 10;
}
.header h1 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(24px, 6vw, 38px);
  color: #d4aaff;
  text-shadow: 0 2px 8px rgba(0,80,0,0.4);
  margin-bottom: 6px;
}
.header p {
  font-size: clamp(13px, 3vw, 15px);
  color: #d4aaff;
  font-weight: 600;
}

/* COUNTER */
.counter-bar {
  position: fixed;
  top: 16px; right: 16px;
  z-index: 100;
  background: rgba(255,255,255,0.92);
  border-radius: 30px;
  padding: 8px 18px;
  font-size: 13px;
  font-weight: 700;
  color: #2a7a1a;
  border: 2px solid #a8e06a;
  box-shadow: 0 2px 12px rgba(0,0,0,0.12);
}

/* HINT */
.hint-bar {
  position: fixed;
  bottom: 16px; left: 50%;
  transform: translateX(-50%);
  z-index: 100;
  background: rgba(255,255,255,0.88);
  border-radius: 30px;
  padding: 7px 20px;
  font-size: 12px;
  font-weight: 600;
  color: #3a7a1a;
  white-space: nowrap;
  pointer-events: none;
  transition: opacity 0.4s;
}

/* EGGS — absolutely placed */
.egg-spot {
  position: absolute;
  z-index: 10;
  cursor: pointer;
  transition: transform 0.18s ease;
  -webkit-tap-highlight-color: transparent;
}
.egg-spot:hover { transform: scale(1.15) rotate(-5deg); }
.egg-spot:active { transform: scale(0.92); }
.egg-spot.found {
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.4s ease, transform 0.4s ease;
  transform: scale(1.4);
}

/* WIGGLE ANIMATION */
@keyframes wiggle {
  0%,100% { transform: rotate(0deg); }
  20% { transform: rotate(-8deg); }
  40% { transform: rotate(8deg); }
  60% { transform: rotate(-5deg); }
  80% { transform: rotate(5deg); }
}
.egg-spot:not(.found) { animation: wiggle 4s ease-in-out infinite; }
.egg-spot:nth-child(2) { animation-delay: 0.5s; }
.egg-spot:nth-child(3) { animation-delay: 1s; }
.egg-spot:nth-child(4) { animation-delay: 1.5s; }
.egg-spot:nth-child(5) { animation-delay: 0.8s; }
.egg-spot:nth-child(6) { animation-delay: 1.3s; }
.egg-spot:nth-child(7) { animation-delay: 0.3s; }
.egg-spot:nth-child(8) { animation-delay: 1.8s; }

/* SPARKLE BURST */
.burst {
  position: absolute;
  pointer-events: none;
  z-index: 50;
  font-size: 22px;
  animation: burst-out 0.7s ease forwards;
  opacity: 0;
}
@keyframes burst-out {
  0% { opacity: 1; transform: scale(0.5); }
  60% { opacity: 1; transform: scale(1.4); }
  100% { opacity: 0; transform: scale(1.8) translateY(-20px); }
}

/* SCENERY */
.tree {
  position: absolute;
  z-index: 6;
  pointer-events: none;
}
.bush {
  position: absolute;
  z-index: 7;
  pointer-events: none;
}
.flower-dec {
  position: absolute;
  z-index: 8;
  pointer-events: none;
  font-size: 18px;
  animation: sway 3s ease-in-out infinite;
}
@keyframes sway {
  0%,100% { transform: rotate(-4deg); }
  50% { transform: rotate(4deg); }
}
.cloud-dec {
  position: absolute;
  background: rgba(255,255,255,0.85);
  border-radius: 50px;
  z-index: 3;
  pointer-events: none;
  animation: drift 18s linear infinite;
}
@keyframes drift {
  0% { transform: translateX(0); }
  50% { transform: translateX(30px); }
  100% { transform: translateX(0); }
}
.bunny-dec {
  position: absolute;
  z-index: 8;
  font-size: 36px;
  pointer-events: none;
  animation: bunnyhop 2s ease-in-out infinite;
}
@keyframes bunnyhop {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}

/* MODAL */
.modal-wrap {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(10,50,5,0.55);
  z-index: 200;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.modal-wrap.open { display: flex; }

.modal-card {
  background: #fff;
  border-radius: 24px;
  padding: 36px 28px 28px;
  max-width: 360px;
  width: 100%;
  text-align: center;
  position: relative;
  animation: pop-in 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
}
@keyframes pop-in {
  from { transform: scale(0.7); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

.modal-egg-display { margin-bottom: 16px; }
.modal-num {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  margin-bottom: 10px;
  color: #7ab830;
}
.modal-message {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: clamp(16px, 4vw, 19px);
  color: #1e4a0a;
  line-height: 1.65;
  margin-bottom: 24px;
  padding: 0 4px;
}
.modal-icon { font-size: 28px; margin-bottom: 8px; }

.close-btn {
  background: #4cc464;
  color: #fff;
  border: none;
  border-radius: 30px;
  padding: 11px 30px;
  font-size: 14px;
  font-weight: 700;
  font-family: 'Nunito', sans-serif;
  cursor: pointer;
  transition: background 0.15s, transform 0.1s;
}
.close-btn:hover { background: #3aab4f; transform: scale(1.03); }

/* ALL DONE */
.done-wrap {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(10,50,5,0.65);
  z-index: 300;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.done-wrap.open { display: flex; }
.done-card {
  background: #fff;
  border-radius: 24px;
  padding: 40px 28px 32px;
  max-width: 360px;
  width: 100%;
  text-align: center;
  animation: pop-in 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
}
.done-card h2 {
  font-family: 'Playfair Display', serif;
  font-size: 26px;
  color: #c0395a;
  margin-bottom: 10px;
}
.done-card p {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: 15px;
  color: #333;
  line-height: 1.75;
  margin-bottom: 0;
}
.hearts { font-size: 24px; letter-spacing: 6px; margin: 10px 0 16px; }

/* CONFETTI */
.confetto {
  position: fixed;
  width: 10px; height: 10px;
  border-radius: 2px;
  opacity: 0;
  pointer-events: none;
  z-index: 250;
  animation: fall linear forwards;
}
@keyframes fall {
  0% { opacity: 1; transform: translateY(-20px) rotate(0deg); }
  100% { opacity: 0; transform: translateY(100vh) rotate(720deg); }
}
</style>
</head>
<body>

    <div style="font-size:32px;margin:12px 0;">🐣 🌸 🐰 🌷</div>
    <p>Every single one of those things is true. Thank you for being you, Reece.<br><br>Happy Easter. I love you so much. 🤍</p>
  </div>

<script>
const eggs = [
  { icon: '🩷', color: '#f87c7c', stroke: '#f45050', message: 'Thank you for being so patient with me.' },
  { icon: '⭐', color: '#f9b44a', stroke: '#e8972a', message: 'Thanks for being the finest man EVER.' },
  { icon: '💚', color: '#6dd47e', stroke: '#45b85a', message: 'I love how hardworking and driven you are.' },
  { icon: '💙', color: '#6ab8f7', stroke: '#3d97e0', message: 'Every time you smile or laugh, I fall more in love with you.' },
  { icon: '💜', color: '#c87de8', stroke: '#a855d4', message: 'Thank you for loving me the way you do.' },
  { icon: '🌸', color: '#f97bb0', stroke: '#e04d88', message: 'Thank you for wanting to try again.' },
  { icon: '🌟', color: '#ffd166', stroke: '#f0b830', message: 'Thank you for being so understanding with me.' },
  { icon: '🤍', color: '#5eccc0', stroke: '#35ada0', message: 'Thank you for sharing things about yourself that you might not want to — but you still do it for me.' },
];

let found = 0;
let current = null;
const foundSet = new Set();

function eggSVG(c, s, w, h) {
  return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" fill="none">
    <ellipse cx="${w/2}" cy="${h*0.6}" rx="${w/2-2}" ry="${h*0.45}" fill="${c}"/>
    <ellipse cx="${w/2}" cy="${h*0.6}" rx="${w/2-2}" ry="${h*0.45}" fill="none" stroke="${s}" stroke-width="2" opacity="0.5"/>
    <ellipse cx="${w/2}" cy="${h*0.38}" rx="${w*0.28}" ry="${h*0.13}" fill="#fff" opacity="0.35"/>
  </svg>`;
}

function openEgg(i) {
  if (foundSet.has(i)) return;
  current = i;
  const egg = eggs[i];
  document.getElementById('modal-icon').textContent = egg.icon;
  document.getElementById('modal-egg-svg').innerHTML = eggSVG(egg.color, egg.stroke, 80, 100);
  document.getElementById('modal-num').textContent = 'Egg ' + (i + 1) + ' of 8';
  document.getElementById('modal-msg').textContent = egg.message;
  document.getElementById('modal').classList.add('open');
}

function closeModal() {
  if (current !== null && !foundSet.has(current)) {
    foundSet.add(current);
    found++;

    const el = document.getElementById('e' + current);
    spawnBurst(el);
    el.classList.add('found');

    document.getElementById('counter').textContent = '🥚 ' + found + ' / 8 found';

    if (found === 8) {
      document.getElementById('hint').style.opacity = '0';
      setTimeout(showDone, 500);
    }
  }
  document.getElementById('modal').classList.remove('open');
  current = null;
}

function spawnBurst(el) {
  const rect = el.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;
  ['✨','🌟','💫','🌸','⭐'].forEach((s, i) => {
    const b = document.createElement('div');
    b.className = 'burst';
    b.textContent = s;
    b.style.left = (cx + (Math.random()-0.5)*60) + 'px';
    b.style.top = (cy + (Math.random()-0.5)*40) + 'px';
    b.style.animationDelay = (i * 0.08) + 's';
    document.body.appendChild(b);
    setTimeout(() => b.remove(), 900);
  });
}

function showDone() {
  document.getElementById('done-wrap').classList.add('open');
  launchConfetti();
}

function launchConfetti() {
  const colors = ['#f87c7c','#f9b44a','#6dd47e','#6ab8f7','#c87de8','#f97bb0','#ffd166','#5eccc0'];
  for (let i = 0; i < 80; i++) {
    const c = document.createElement('div');
    c.className = 'confetto';
    c.style.left = Math.random() * 100 + 'vw';
    c.style.top = '-20px';
    c.style.background = colors[Math.floor(Math.random() * colors.length)];
    c.style.animationDuration = (1.5 + Math.random() * 2.5) + 's';
    c.style.animationDelay = (Math.random() * 1.5) + 's';
    c.style.transform = 'rotate(' + (Math.random()*360) + 'deg)';
    document.body.appendChild(c);
    setTimeout(() => c.remove(), 5000);
  }
}
</script>
